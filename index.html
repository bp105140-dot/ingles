<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EnglishQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DESIGN TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  /* Brand */
  --brand: #4F9CF9;
  --brand-dim: rgba(79,156,249,.15);

  /* Light surface */
  --bg:        #EEF3FD;
  --surf:      #FFFFFF;
  --surf2:     #F4F7FE;
  --border:    #E0E8F8;
  --text:      #0D1526;
  --text2:     #5A6680;
  --text3:     #96A3BF;

  /* Semantic */
  --ok:        #22C55E;
  --ok-bg:     #F0FDF4;
  --ok-border: #BBF7D0;
  --err:       #EF4444;
  --err-bg:    #FEF2F2;
  --err-border:#FECACA;

  /* Radii & shadows */
  --r:    18px;
  --r-sm: 12px;
  --r-xs: 8px;
  --sh:   0 2px 16px rgba(13,21,38,.07);
  --sh-lg:0 8px 48px rgba(13,21,38,.12);

  /* Topbar */
  --bar-h: 62px;
  --bar-bg:rgba(238,243,253,.9);
  --bar-bdr:rgba(224,232,248,.9);
}

[data-theme="dark"] {
  --brand-dim: rgba(79,156,249,.18);
  --bg:        #080C14;
  --surf:      #101420;
  --surf2:     #181D2C;
  --border:    #232A3E;
  --text:      #E8EEFF;
  --text2:     #7B88A8;
  --text3:     #3E4A68;
  --ok-bg:     #052E16;
  --ok-border: #166534;
  --err-bg:    #450A0A;
  --err-border:#991B1B;
  --sh:        0 2px 16px rgba(0,0,0,.4);
  --sh-lg:     0 8px 48px rgba(0,0,0,.6);
  --bar-bg:    rgba(8,12,20,.9);
  --bar-bdr:   rgba(35,42,62,.9);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  transition:background .35s,color .35s;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
svg{display:block}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP SHELL — single-page with layers
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#app{
  position:fixed;inset:0;
  display:grid;
  grid-template-rows:var(--bar-h) 1fr;
}

/* GLOBAL TOP BAR */
#topbar{
  grid-row:1;
  display:flex;align-items:center;gap:12px;
  padding:0 20px;
  background:var(--bar-bg);
  border-bottom:1px solid var(--bar-bdr);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  z-index:100;
  transition:background .35s,border-color .35s;
}
#topbar-brand{
  font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  color:var(--text);transition:color .2s;
}
#topbar-brand:hover{color:var(--brand)}
.brand-dot{
  width:32px;height:32px;border-radius:10px;
  background:var(--brand);display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(79,156,249,.4);
}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pts-chip{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:50px;
  background:var(--surf2);border:1px solid var(--border);
  font-size:13px;font-weight:800;color:var(--text);
  transition:background .35s,border-color .35s;
}
.pts-chip .star{font-size:14px}
.tb-btn{
  width:38px;height:38px;border-radius:var(--r-xs);
  background:var(--surf2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--text);
  transition:all .2s;
}
.tb-btn:hover{background:var(--border);transform:scale(1.07)}

/* PAGES CONTAINER */
#pages{
  grid-row:2;
  position:relative;overflow:hidden;
}

/* Each page fills the container */
.page{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateY(12px);
  transition:opacity .3s ease,transform .3s ease;
}
.page.active{
  opacity:1;pointer-events:all;
  transform:translateY(0);
}
.page.exit{
  opacity:0;transform:translateY(-12px);
  pointer-events:none;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#pg-home{overflow-y:auto}

.home-hero{
  padding:40px 24px 52px;
  background:linear-gradient(145deg,#1a3c8f 0%,#2563d1 45%,#4F9CF9 100%);
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-inner{position:relative;max-width:1100px;margin:0 auto;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px;}
.hero-head h1{
  font-family:'Syne',sans-serif;font-weight:800;font-size:36px;
  color:#fff;line-height:1.1;margin-bottom:6px;
}
.hero-head p{font-size:15px;color:rgba(255,255,255,.75);font-weight:600;}
.hero-stat-cards{display:flex;gap:10px;flex-wrap:wrap;}
.hsc{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(8px);
  border-radius:var(--r-sm);padding:14px 18px;
  min-width:90px;
}
.hsc-n{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#fff;line-height:1;}
.hsc-l{font-size:11px;color:rgba(255,255,255,.65);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}

.home-body{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}
.section-label{
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text3);margin-bottom:16px;
}
.mods-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:14px;
}

/* Module card */
.mod-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  cursor:pointer;
  box-shadow:var(--sh);
  transition:transform .22s,box-shadow .22s,border-color .22s;
  position:relative;overflow:hidden;
  display:flex;gap:16px;align-items:flex-start;
}
.mod-card:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
.mod-card:hover{border-color:var(--c,var(--brand))}
.mod-card:active{transform:translateY(-1px)}
/* accent stripe */
.mod-card::after{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--c);border-radius:2px 0 0 2px;
  transition:width .2s;
}
.mod-card:hover::after{width:4px}

/* SVG progress ring */
.mod-ring-wrap{flex-shrink:0;position:relative;width:56px;height:56px;}
.mod-ring-wrap .emoji{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:3}
.ring-fg{fill:none;stroke-width:3;stroke-linecap:round;stroke:var(--c);
  transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1);}

.mod-info{flex:1;min-width:0;}
.mod-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--text);margin-bottom:2px;}
.mod-sub{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-meta{display:flex;align-items:center;gap:8px;}
.mod-badge{
  padding:3px 10px;border-radius:50px;
  font-size:11px;font-weight:800;
  background:var(--brand-dim);color:var(--brand);
}
.mod-pct{font-size:11px;font-weight:700;color:var(--text3);}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   QUIZ PAGE — fixed header + sticky footer
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#pg-quiz{overflow:hidden}

/* Quiz top strip */
.qz-strip{
  flex-shrink:0;background:var(--surf);
  border-bottom:1px solid var(--border);
  padding:12px 20px 0;
  transition:background .35s,border-color .35s;
}
.qz-strip-row{display:flex;align-items:center;gap:12px;padding-bottom:12px;}
.back-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--surf2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text);transition:all .18s;flex-shrink:0;
}
.back-btn:hover{background:var(--border)}
.qz-module-name{
  flex:1;font-family:'Syne',sans-serif;font-weight:800;
  font-size:15px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.qz-pts{
  background:rgba(244,180,0,.15);color:#B45309;
  border:1px solid rgba(244,180,0,.3);
  border-radius:50px;padding:5px 12px;
  font-size:13px;font-weight:800;
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
[data-theme="dark"] .qz-pts{color:#FCD34D}

/* Step dots progress */
.qz-dots{display:flex;gap:3px;align-items:center;overflow:hidden;height:6px;}
.qdot{
  flex:1;height:6px;border-radius:3px;
  background:var(--border);transition:background .3s;
}
.qdot.done{background:var(--ok)}
.qdot.current{background:var(--brand)}

/* Scrollable question area */
.qz-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  background:var(--bg);
  transition:background .35s;
  display:flex;justify-content:center;align-items:flex-start;
  padding:24px 20px 16px;
}
.q-wrap{width:100%;max-width:640px;}

.q-num{
  font-size:11px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.q-num-line{flex:1;height:1px;background:var(--border)}

.q-text{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:22px;line-height:1.4;color:var(--text);
  margin-bottom:20px;
}

/* Options grid */
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  background:var(--surf);border:2px solid var(--border);
  border-radius:var(--r-sm);padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  font-size:15px;font-weight:700;color:var(--text);
  cursor:pointer;text-align:left;width:100%;
  transition:border-color .15s,background .15s,transform .15s;
}
.opt:hover:not(:disabled){
  border-color:var(--brand);background:var(--brand-dim);
  transform:translateX(3px);
}
.opt-key{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:var(--surf2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:var(--text3);
  transition:all .15s;
}
.opt.hit   {border-color:var(--ok); background:var(--ok-bg);}
.opt.hit   .opt-key{background:var(--ok);border-color:var(--ok);color:#fff;}
.opt.miss  {border-color:var(--err);background:var(--err-bg);}
.opt.miss  .opt-key{background:var(--err);border-color:var(--err);color:#fff;}
.opt.reveal{border-color:var(--ok);background:var(--ok-bg);opacity:.6}
.opt.reveal .opt-key{background:var(--ok);border-color:var(--ok);color:#fff;}
.opt:disabled{cursor:default;transform:none!important}

/* Fill input */
.fill-group{display:flex;flex-direction:column;gap:10px;}
.fill-in{
  border:2px solid var(--border);border-radius:var(--r-sm);
  padding:14px 16px;font-size:16px;font-weight:700;
  color:var(--text);background:var(--surf);outline:none;width:100%;
  transition:border-color .2s,background .35s;
}
.fill-in::placeholder{color:var(--text3);font-weight:600}
.fill-in:focus{border-color:var(--brand)}
.fill-in.hit {border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.fill-in.miss{border-color:var(--err);background:var(--err-bg);color:var(--err)}
[data-theme="dark"] .fill-in.hit {color:#4ADE80}
[data-theme="dark"] .fill-in.miss{color:#FCA5A5}
.check-btn{
  background:var(--brand);color:#fff;
  border-radius:var(--r-sm);padding:14px 24px;
  font-size:15px;font-weight:800;
  transition:all .2s;align-self:flex-start;
}
.check-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-2px)}
.check-btn:disabled{opacity:.5;cursor:default;transform:none}

/* STICKY QUIZ FOOTER */
.qz-footer{
  flex-shrink:0;
  background:var(--surf);
  border-top:1px solid var(--border);
  padding:14px 20px;
  display:flex;flex-direction:column;gap:10px;
  transition:background .35s,border-color .35s;
  min-height:70px;
}
.qz-footer-inner{display:flex;align-items:center;gap:12px;}
.fb-msg{
  flex:1;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:8px;
  display:none;
}
.fb-msg.show{display:flex;animation:fadeIn .2s}
.fb-msg.ok {color:var(--ok)}
.fb-msg.err{color:var(--err)}
.fb-icon{font-size:18px}
.fb-text{font-size:13px;line-height:1.35}
.fb-text strong{display:block;font-size:14px}
.next-btn{
  background:var(--brand);color:#fff;
  border-radius:var(--r-sm);
  padding:13px 24px;font-size:15px;font-weight:800;
  transition:all .2s;white-space:nowrap;flex-shrink:0;
  display:none;
}
.next-btn.show{display:block;animation:fadeIn .2s}
.next-btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.next-btn:active{transform:translateY(0)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESULTS PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#pg-results{
  justify-content:center;align-items:center;
  overflow-y:auto;padding:20px;background:var(--bg);
}
.res-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:26px;
  box-shadow:var(--sh-lg);
  padding:44px 40px;
  max-width:500px;width:100%;
  text-align:center;
  animation:cardIn .5s cubic-bezier(.175,.885,.32,1.275);
}
.res-mascot{font-size:64px;display:block;margin-bottom:10px;animation:mascotBob 2s ease-in-out infinite}
.res-title{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;color:var(--text);margin-bottom:3px}
.res-sub{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:28px}

/* Big ring for results */
.big-ring{width:160px;height:160px;margin:0 auto 12px;position:relative;}
.big-ring-inner{
  position:absolute;inset:16px;border-radius:50%;
  background:var(--surf);display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:background .35s;
}
.big-ring svg{transform:rotate(-90deg)}
.br-bg{fill:none;stroke:var(--border);stroke-width:10}
.br-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.score-big{font-family:'Syne',sans-serif;font-weight:800;font-size:36px;color:var(--text);line-height:1;}
.score-of{font-size:12px;color:var(--text3);font-weight:700}
.pct-big{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text2);margin-bottom:16px}

.stars{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.star-el{font-size:34px;filter:grayscale(1) opacity(.25);transition:all .3s}
.star-el.lit{filter:none;animation:starPop .4s cubic-bezier(.175,.885,.32,1.275) both}

.res-msg-box{
  border-radius:var(--r-sm);padding:12px 16px;
  font-size:14px;font-weight:700;margin-bottom:24px;line-height:1.4;
}
.res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-sec{
  padding:13px 22px;border-radius:var(--r-sm);
  font-size:14px;font-weight:800;
  background:var(--surf2);border:1px solid var(--border);color:var(--text);
  transition:all .2s;
}
.btn-pri{
  padding:13px 22px;border-radius:var(--r-sm);
  font-size:14px;font-weight:800;
  background:var(--brand);color:#fff;
  transition:all .2s;
}
.btn-sec:hover,.btn-pri:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.15)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFETTI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#cvc{position:fixed;inset:0;pointer-events:none;z-index:999}
.floatie{
  position:fixed;font-size:38px;pointer-events:none;z-index:998;
  animation:floatUp 2s ease forwards;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ANIMATIONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes cardIn    {from{opacity:0;transform:scale(.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes mascotBob {0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes starPop   {from{transform:scale(0) rotate(-25deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes shake     {0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SAVED STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let saved={};
try{saved=JSON.parse(localStorage.getItem('eq4')||'{}');}catch(e){}
function persist(){try{localStorage.setItem('eq4',JSON.stringify(saved));}catch(e){}}
function totalPts(){return Object.values(saved).reduce((t,v)=>t+(v.score||0),0);}
function syncPts(){$('g-pts').textContent=totalPts();}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NAVIGATION — smooth transitions
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let currentPage='home';
function nav(to,data){
  if(to===currentPage&&to==='home'){renderHome();return;}
  const from=$('pg-'+currentPage);
  const toEl=$('pg-'+to);
  if(from){from.classList.add('exit');setTimeout(()=>from.classList.remove('active','exit'),320);}
  toEl.classList.add('active');
  currentPage=to;
  // reset inner scrolls
  $('pg-'+to).querySelectorAll('[id$="-scroll"],[id="pg-home"]').forEach(el=>el.scrollTop=0);
  if(to==='home'){renderHome();}
  if(to==='quiz'&&data){startMod(data);}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME RENDER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderHome(){
  syncPts();
  $('h-done').textContent=Object.keys(saved).length;
  const grid=$('mods-grid');
  grid.innerHTML='';
  MODS.forEach(m=>{
    const sv=saved[m.id]||{};
    const pct=sv.pct??0;
    const circ=2*Math.PI*24; // r=24
    const offset=circ*(1-pct/100);

    const card=document.createElement('div');
    card.className='mod-card';
    card.style.setProperty('--c',m.color);
    card.onclick=()=>nav('quiz',m.id);

    card.innerHTML=`
      <div class="mod-ring-wrap">
        <svg class="ring-svg" width="56" height="56" viewBox="0 0 56 56">
          <circle class="ring-bg" cx="28" cy="28" r="24"/>
          <circle class="ring-fg" cx="28" cy="28" r="24"
            stroke="${m.color}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="emoji">${m.emoji}</div>
      </div>
      <div class="mod-info">
        <div class="mod-title">${m.title}</div>
        <div class="mod-sub">${m.sub}</div>
        <div class="mod-meta">
          <span class="mod-badge">${m.qs.length} questões</span>
          <span class="mod-pct">${sv.pct!=null?`${sv.pct}% concluído`:'Não iniciado'}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
    // Animate ring in
    requestAnimationFrame(()=>{
      const fg=card.querySelector('.ring-fg');
      fg.style.strokeDasharray=circ;
      fg.style.strokeDashoffset=circ;
      requestAnimationFrame(()=>{ fg.style.strokeDashoffset=offset; });
    });
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   QUIZ ENGINE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let Q={mod:null,qs:[],idx:0,score:0,answered:false};

function startMod(mid){
  const m=MODS.find(x=>x.id===mid);
  Q.mod=m; Q.qs=shuffle([...m.qs]); Q.idx=0; Q.score=0; Q.answered=false;
  $('qz-name').textContent=`${m.emoji} ${m.title}`;
  renderDots();
  renderQ();
}

function renderDots(){
  const wrap=$('qz-dots');
  wrap.innerHTML='';
  Q.qs.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='qdot'+(i===Q.idx?' current':i<Q.idx?' done':'');
    wrap.appendChild(d);
  });
}

function renderQ(){
  const q=Q.qs[Q.idx];
  Q.answered=false;

  // Update header
  $('qz-sc').textContent=Q.score;
  renderDots();

  // Reset footer
  const fb=$('fb-msg'); fb.className='fb-msg'; fb.style.display='none';
  const nb=$('next-btn'); nb.className='next-btn'; nb.style.display='none';

  // Build question
  const wrap=$('q-wrap');
  wrap.innerHTML=`
    <div class="q-num">
      <span>${Q.idx+1} / ${Q.qs.length}</span>
      <div class="q-num-line"></div>
    </div>
    <div class="q-text">${q.q}</div>
    ${q.type==='mc'?buildOpts(q):buildFill()}
  `;

  // Scroll question area to top
  $('qz-scroll').scrollTop=0;

  if(q.type==='fill'){
    const inp=__('#fill-in');
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
    setTimeout(()=>inp.focus(),100);
  }
}

function buildOpts(q){
  return `<div class="opts">${q.opts.map((o,i)=>
    `<button class="opt" data-v="${esc(o)}"
      onclick="checkMC(this,'${esc(o)}','${esc(q.ans)}')">
      <span class="opt-key">${LETS[i]}</span>
      <span>${o}</span>
    </button>`
  ).join('')}</div>`;
}
function buildFill(){
  return `<div class="fill-group">
    <input id="fill-in" class="fill-in" type="text"
      placeholder="Escreva a resposta em inglês…"
      autocomplete="off" spellcheck="false">
    <button class="check-btn" id="chk-btn" onclick="checkFill()">Verificar ✓</button>
  </div>`;
}

const HITS=['🎯 Perfeito!','⭐ Excelente!','🔥 Mandou bem!','💪 Isso aí!','🚀 Incrível!','✨ Arrasou!'];
const MISS=['Não foi desta vez','Continue tentando','Quase lá!','Não desista!'];

function showFeedback(ok,ans){
  const fb=$('fb-msg');
  fb.className=`fb-msg show ${ok?'ok':'err'}`;
  $('fb-icon').textContent=ok?'✅':'❌';
  $('fb-head').textContent=ok?HITS[0|Math.random()*HITS.length]:MISS[0|Math.random()*MISS.length];
  $('fb-body').textContent=ok?'':`Resposta certa: "${ans}"`;
  // Show next button
  const nb=$('next-btn');
  nb.textContent=Q.idx<Q.qs.length-1?'Próxima ➜':'Ver resultado 🏁';
  nb.className='next-btn show';
}

function checkMC(btn,chosen,correct){
  if(Q.answered)return;
  Q.answered=true;
  const allOpts=btn.closest('.opts').querySelectorAll('.opt');
  allOpts.forEach(b=>{
    b.disabled=true;
    if(b.dataset.v===correct){
      b.classList.add(chosen===correct?'hit':'reveal');
    }
  });
  const ok=chosen===correct;
  if(!ok){btn.classList.remove('reveal');btn.classList.add('miss');btn.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:350});}
  else{btn.animate([{transform:'scale(1)'},{transform:'scale(1.03)'},{transform:'scale(1)'}],{duration:280});}
  if(ok){Q.score++;spawnE('🎉');}
  $('qz-sc').textContent=Q.score;
  showFeedback(ok,correct);
}

function checkFill(){
  if(Q.answered)return;
  const inp=__('#fill-in');
  const v=inp.value.trim();if(!v)return;
  const q=Q.qs[Q.idx];
  const ok=norm(v)===norm(q.ans);
  Q.answered=true;
  inp.disabled=true;
  __('#chk-btn').disabled=true;
  inp.classList.add(ok?'hit':'miss');
  if(!ok){inp.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:300});}
  if(ok){Q.score++;spawnE('🎉');}
  $('qz-sc').textContent=Q.score;
  showFeedback(ok,q.ans);
}

function nextQ(){
  Q.idx++;
  if(Q.idx>=Q.qs.length)showResults();
  else renderQ();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESULTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const RCFG=[
  {min:100,mascot:'🏆',title:'Perfeito! 100%!',msg:'Nota máxima! Você é incrível! 🌟',bg:'#FFF9E6',dbg:'#2A2208',stars:3},
  {min:80, mascot:'🎉',title:'Muito bem!',     msg:'Ótimo desempenho! Continue assim! 💪',bg:'#F0FDF4',dbg:'#052E16',stars:3},
  {min:60, mascot:'😊',title:'Bom trabalho!',  msg:'Você está indo bem! Pratique mais! 📚',bg:'#EFF6FF',dbg:'#0C1A38',stars:2},
  {min:40, mascot:'💪',title:'Continue!',      msg:'Cada erro é aprendizado! 🌱',bg:'#FFF7ED',dbg:'#2A1600',stars:1},
  {min:0,  mascot:'🌱',title:'Você começou!',  msg:'A jornada começa com o primeiro passo! 🚀',bg:'#FAF5FF',dbg:'#1A0A2A',stars:1},
];

function showResults(){
  const {mod,qs,score}=Q;
  const total=qs.length;
  const pct=Math.round(score/total*100);
  const prev=saved[mod.id]||{};
  if(prev.pct==null||pct>=prev.pct){saved[mod.id]={score,total,pct};persist();}
  syncPts();

  const cfg=RCFG.find(r=>pct>=r.min);

  $('r-mascot').textContent=cfg.mascot;
  $('r-title').textContent=cfg.title;
  $('r-sub').textContent=`${mod.emoji} ${mod.title}`;

  // Animated counter
  $('r-num').textContent='0';
  $('r-of').textContent=`de ${total}`;
  $('r-pct').textContent='0%';
  const msgBox=$('r-msg');
  msgBox.textContent=cfg.msg;
  msgBox.style.background=dark?cfg.dbg:cfg.bg;
  msgBox.style.color=dark?'#E8EEFF':cfg.dbg||'#1A1D2E';

  // SVG ring
  const circ=2*Math.PI*70;
  const fg=$('r-ring');
  fg.setAttribute('stroke',mod.color);
  fg.style.strokeDasharray=circ;
  fg.style.strokeDashoffset=circ;

  // Stars reset
  document.querySelectorAll('#r-stars .star-el').forEach(s=>s.classList.remove('lit'));

  nav('results');

  // Animate after mount
  setTimeout(()=>{
    // Ring
    fg.style.strokeDashoffset=circ*(1-pct/100);
    // Counter
    let c=0;
    const interval=setInterval(()=>{
      c=Math.min(c+Math.ceil(score/20),score);
      $('r-num').textContent=c;
      $('r-pct').textContent=Math.round(c/total*100)+'%';
      if(c>=score)clearInterval(interval);
    },40);
    // Stars
    const stars=document.querySelectorAll('#r-stars .star-el');
    stars.forEach((s,i)=>{if(i<cfg.stars)setTimeout(()=>s.classList.add('lit'),400+i*230);});
    if(pct>=60)setTimeout(launchConf,200);
    if(pct===100)for(let i=0;i<8;i++)setTimeout(()=>spawnE(['🏆','🎉','⭐','🌟'][0|Math.random()*4]),i*180);
  },60);
}

function retryMod(){nav('quiz',Q.mod.id);}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFETTI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CV=$('cvc'),cx=CV.getContext('2d');
let pieces=[],aid=null;
function launchConf(){
  CV.width=innerWidth;CV.height=innerHeight;
  pieces=[];
  const cols=['#4F9CF9','#22C55E','#F59E0B','#A855F7','#EC4899','#06B6D4','#EF4444'];
  for(let i=0;i<160;i++)pieces.push({
    x:Math.random()*CV.width,y:-30-Math.random()*120,
    w:6+Math.random()*8,h:3+Math.random()*5,
    col:cols[0|Math.random()*cols.length],
    vx:(Math.random()-.5)*5,vy:2+Math.random()*5,
    rot:Math.random()*360,vr:(Math.random()-.5)*8,life:1
  });
  if(aid)cancelAnimationFrame(aid);
  animC();
}
function animC(){
  cx.clearRect(0,0,CV.width,CV.height);
  pieces=pieces.filter(p=>p.life>0);
  pieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
    if(p.y>CV.height-30)p.life-=.03;
    cx.save();cx.globalAlpha=p.life;
    cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);
    cx.fillStyle=p.col;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cx.restore();
  });
  if(pieces.length)aid=requestAnimationFrame(animC);
  else cx.clearRect(0,0,CV.width,CV.height);
}
function spawnE(e){
  const el=document.createElement('div');
  el.className='floatie';el.textContent=e;
  el.style.cssText=`left:${10+Math.random()*80}vw;bottom:${5+Math.random()*20}vh`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}
window.addEventListener('resize',()=>{CV.width=innerWidth;CV.height=innerHeight;});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BOOT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
renderHome();
</script>
