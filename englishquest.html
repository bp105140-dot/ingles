<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishQuest 🚀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* =====================================================
   TOKENS — LIGHT & DARK
   ===================================================== */
:root {
  --coral:   #FF6B6B;
  --teal:    #4ECDC4;
  --yellow:  #FFE66D;
  --mint:    #6BCB77;
  --purple:  #C77DFF;
  --blue:    #74B9FF;
  --orange:  #FF8E53;
  --radius:  20px;
  --radius-sm: 12px;
  --bg:          #F5F7FF;
  --surface:     #FFFFFF;
  --surface-2:   #EEF1FA;
  --border:      #E2E6F2;
  --text:        #1A1D2E;
  --text-2:      #5A6070;
  --text-3:      #9099A8;
  --shadow:      0 4px 24px rgba(0,0,0,0.07);
  --shadow-lg:   0 12px 48px rgba(0,0,0,0.12);
  --header-bg:   rgba(245,247,255,0.94);
}
[data-theme="dark"] {
  --bg:          #0F1117;
  --surface:     #1A1D2A;
  --surface-2:   #22263A;
  --border:      #2E3250;
  --text:        #EEF0F8;
  --text-2:      #8890B8;
  --text-3:      #525878;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:   0 12px 48px rgba(0,0,0,0.55);
  --header-bg:   rgba(15,17,23,0.94);
}

/* =====================================================
   RESET & BASE
   ===================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* =====================================================
   PAGES — each is its own full-screen layer
   Strategy: only ONE page is visible at a time.
   The entire window.scrollY is always 0 on switch.
   ===================================================== */
.page {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}
.page.active { display: flex; }

/* =====================================================
   GLOBAL TOP BAR (fixed, always on top)
   ===================================================== */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: 58px;
  background: var(--header-bg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 18px; gap: 10px;
  transition: background 0.3s, border-color 0.3s;
}
.topbar-brand {
  font-family: 'Fredoka One', cursive;
  font-size: 21px;
  background: linear-gradient(120deg, var(--coral) 0%, var(--orange) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  flex: 1; cursor: pointer;
}
.topbar-brand .rocket { -webkit-text-fill-color: initial; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.score-pill {
  background: var(--surface-2); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 5px 14px;
  font-size: 13px; font-weight: 800;
  color: var(--text); display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
  transition: background 0.3s, border-color 0.3s;
}
.score-pill .s { color: #F4B400; }
.icon-btn {
  width: 38px; height: 38px;
  background: var(--surface-2); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; transition: all 0.2s; color: var(--text);
}
.icon-btn:hover { background: var(--border); transform: scale(1.08); }

/* =====================================================
   HOME PAGE
   ===================================================== */
#page-home { padding-top: 58px; }

.home-hero {
  background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 45%, #FFE66D 100%);
  padding: 52px 24px 68px;
  text-align: center;
  clip-path: ellipse(120% 100% at 50% 0%);
}
.hero-icon  { font-size: 58px; display: block; animation: bob 3s ease-in-out infinite; margin-bottom: 10px; }
.hero-title {
  font-family: 'Fredoka One', cursive; font-size: 50px; color: #fff;
  text-shadow: 3px 4px 0 rgba(0,0,0,0.14); margin-bottom: 5px; line-height: 1;
}
.hero-sub   { font-size: 17px; color: rgba(255,255,255,0.93); font-weight: 700; margin-bottom: 24px; }
.hero-badges { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.hero-badge {
  background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.38);
  backdrop-filter: blur(8px); border-radius: 50px; padding: 6px 16px;
  color: #fff; font-weight: 800; font-size: 13px;
}

.home-body {
  max-width: 1140px; margin: 0 auto;
  padding: 36px 22px 80px;
}
.home-sec-title {
  font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--text);
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.mod-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 22px 20px 18px; cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
  position: relative; overflow: hidden;
}
.mod-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--c); border-radius: 20px 20px 0 0; transition: height 0.22s;
}
.mod-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--c); }
.mod-card:hover::before { height: 6px; }
.mc-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.mc-emoji { font-size: 38px; line-height: 1; }
.mc-pill {
  background: var(--c); color: #fff;
  border-radius: 50px; padding: 3px 11px;
  font-size: 11px; font-weight: 800; white-space: nowrap;
}
.mc-title { font-family: 'Fredoka One', cursive; font-size: 19px; color: var(--text); margin-bottom: 1px; }
.mc-sub   { font-size: 12px; color: var(--text-2); font-weight: 600; margin-bottom: 12px; }
.mc-bar   { height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
.mc-bar-fill { height: 100%; background: var(--c); border-radius: 10px; transition: width 0.5s; }
.mc-bar-lbl  { font-size: 11px; color: var(--text-3); font-weight: 700; }

/* =====================================================
   QUIZ PAGE — fills viewport exactly, inner scroll
   ===================================================== */
#page-quiz {
  padding-top: 58px;
  height: 100vh;
  max-height: 100vh;
  overflow: hidden;
}
.quiz-sub {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px 0;
  flex-shrink: 0;
  transition: background 0.3s, border-color 0.3s;
}
.quiz-sub-row {
  display: flex; align-items: center; gap: 10px; padding-bottom: 10px;
}
.btn-back {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--surface-2); border: 1.5px solid var(--border);
  cursor: pointer; font-size: 17px; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; flex-shrink: 0;
}
.btn-back:hover { background: var(--border); }
.quiz-meta { flex: 1; min-width: 0; }
.quiz-name  {
  font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.quiz-cnt   { font-size: 11px; color: var(--text-3); font-weight: 700; }
.quiz-pts {
  background: var(--yellow); color: #1A1D2E;
  border-radius: 50px; padding: 5px 12px;
  font-weight: 800; font-size: 13px;
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.prog-track { height: 4px; background: var(--border); }
.prog-fill  { height: 100%; border-radius: 0 4px 4px 0; transition: width 0.35s ease; }

/* inner scrollable area */
.quiz-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 26px 18px 60px;
  background: var(--bg);
  transition: background 0.3s;
}
.q-card {
  background: var(--surface);
  border-radius: var(--radius); border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  padding: 32px 32px 28px;
  max-width: 660px; width: 100%;
  animation: slideUp 0.26s ease;
  transition: background 0.3s, border-color 0.3s;
}
.q-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.7px;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 12px;
}
.q-tag-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.q-text {
  font-family: 'Fredoka One', cursive; font-size: 25px;
  line-height: 1.35; color: var(--text); margin-bottom: 22px;
}

/* MC */
.opts-grid { display: grid; gap: 10px; }
.opts-grid.g2 { grid-template-columns: 1fr 1fr; }
.opts-grid.g1 { grid-template-columns: 1fr; }
.opt-btn {
  background: var(--surface-2); border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 16px;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; text-align: left; color: var(--text);
  display: flex; align-items: center; gap: 10px; transition: all 0.17s;
}
.opt-btn:hover:not(:disabled) {
  background: var(--surface); border-color: var(--teal);
  transform: translateX(3px); box-shadow: 0 2px 10px rgba(78,205,196,0.18);
}
.opt-ltr {
  min-width: 28px; height: 28px; border-radius: 7px;
  background: var(--border); color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; flex-shrink: 0; transition: all 0.17s;
}
.opt-btn.correct { background:#D4EDDA; border-color:#28A745; color:#155724; animation:pop 0.3s; }
.opt-btn.correct .opt-ltr { background:#28A745; color:#fff; }
.opt-btn.wrong   { background:#F8D7DA; border-color:#DC3545; color:#721C24; animation:shake 0.38s; }
.opt-btn.wrong   .opt-ltr { background:#DC3545; color:#fff; }
.opt-btn:disabled { cursor:default; transform:none !important; box-shadow:none !important; }
[data-theme="dark"] .opt-btn.correct { background:#1A3D28; border-color:#2EA043; color:#7EE89B; }
[data-theme="dark"] .opt-btn.correct .opt-ltr { background:#2EA043; color:#fff; }
[data-theme="dark"] .opt-btn.wrong   { background:#3D1A1E; border-color:#C0392B; color:#FF9090; }
[data-theme="dark"] .opt-btn.wrong   .opt-ltr { background:#C0392B; color:#fff; }

/* Fill */
.fill-wrap { display:flex; flex-direction:column; gap:10px; }
.fill-inp {
  border:2px solid var(--border); border-radius:var(--radius-sm);
  padding:13px 16px; font-size:17px;
  font-family:'Nunito',sans-serif; font-weight:700;
  color:var(--text); background:var(--surface-2); outline:none; width:100%;
  transition:border-color 0.2s, background 0.3s;
}
.fill-inp::placeholder { color:var(--text-3); }
.fill-inp:focus  { border-color:var(--teal); background:var(--surface); }
.fill-inp.correct{ border-color:#28A745; background:#D4EDDA; color:#155724; }
.fill-inp.wrong  { border-color:#DC3545; background:#F8D7DA; color:#721C24; }
[data-theme="dark"] .fill-inp.correct { background:#1A3D28; color:#7EE89B; }
[data-theme="dark"] .fill-inp.wrong   { background:#3D1A1E; color:#FF9090; }

.btn-chk {
  background:var(--teal); color:#fff;
  border:none; border-radius:var(--radius-sm);
  padding:13px 26px; font-size:15px; font-weight:800;
  cursor:pointer; font-family:'Nunito',sans-serif; transition:all 0.2s;
}
.btn-chk:hover:not(:disabled) { filter:brightness(1.08); transform:translateY(-2px); }
.btn-chk:disabled { opacity:0.5; cursor:default; transform:none; }

/* Feedback */
.feedback {
  display:none; border-radius:var(--radius-sm);
  padding:11px 14px; font-weight:700; font-size:13px; margin-top:12px;
  align-items:center; gap:7px;
}
.feedback.show { display:flex; animation:fadeIn 0.22s; }
.feedback.ok  { background:#D4EDDA; color:#155724; }
.feedback.err { background:#F8D7DA; color:#721C24; }
[data-theme="dark"] .feedback.ok  { background:#1A3D28; color:#7EE89B; }
[data-theme="dark"] .feedback.err { background:#3D1A1E; color:#FF9090; }

.btn-next {
  display:none; width:100%; margin-top:16px;
  background:var(--coral); color:#fff;
  border:none; border-radius:var(--radius-sm);
  padding:14px; font-size:16px; font-weight:800;
  cursor:pointer; font-family:'Nunito',sans-serif; transition:all 0.2s;
}
.btn-next.show { display:block; animation:fadeIn 0.22s; }
.btn-next:hover { filter:brightness(1.08); transform:translateY(-2px); }

/* =====================================================
   RESULTS PAGE
   ===================================================== */
#page-results {
  padding-top: 58px;
  align-items: center; justify-content: center;
  min-height: 100vh;
  padding-bottom: 40px;
  overflow-y: auto;
}
.res-wrap {
  background:var(--surface); border-radius:28px;
  border:1.5px solid var(--border);
  box-shadow:var(--shadow-lg);
  padding:48px 40px; max-width:530px; width:100%;
  text-align:center; margin: 20px;
  animation:popIn 0.42s cubic-bezier(0.175,0.885,0.32,1.275);
  transition:background 0.3s, border-color 0.3s;
}
.res-mascot { font-size:68px; display:block; margin-bottom:8px; animation:bob 2s ease-in-out infinite; }
.res-title  { font-family:'Fredoka One',cursive; font-size:34px; color:var(--text); margin-bottom:3px; }
.res-sub    { font-size:15px; color:var(--text-2); font-weight:700; margin-bottom:24px; }

.score-ring {
  width:148px; height:148px; margin:0 auto 16px;
  border-radius:50%; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.score-ring::before {
  content:''; position:absolute; inset:16px;
  background:var(--surface); border-radius:50%; transition:background 0.3s;
}
.score-inner { position:relative; z-index:1; }
.score-num  { font-family:'Fredoka One',cursive; font-size:40px; color:var(--text); line-height:1; display:block; }
.score-of   { font-size:12px; color:var(--text-3); font-weight:700; }
.pct-lbl    { font-size:19px; font-weight:900; color:var(--text-2); margin-bottom:16px; }

.stars-row  { display:flex; justify-content:center; gap:10px; margin-bottom:16px; }
.star-ico   { font-size:36px; filter:grayscale(1) opacity(0.3); transition:all 0.3s; }
.star-ico.lit { filter:none; animation:starPop 0.38s cubic-bezier(0.175,0.885,0.32,1.275) both; }

.res-msg    { font-size:16px; font-weight:700; padding:12px 18px; border-radius:12px; margin-bottom:24px; line-height:1.4; }
.res-acts   { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn-r {
  padding:13px 26px; border-radius:var(--radius-sm);
  font-size:15px; font-weight:800; cursor:pointer; border:none;
  font-family:'Nunito',sans-serif; transition:all 0.2s;
}
.btn-r:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.18); }
.btn-r-pri  { background:var(--coral); color:#fff; }
.btn-r-sec  { background:var(--surface-2); border:1.5px solid var(--border); color:var(--text); }

/* =====================================================
   CONFETTI / FLOATIES
   ===================================================== */
#confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:999; }
.floatie {
  position:fixed; font-size:42px; pointer-events:none; z-index:998;
  animation:floatUp 2s ease forwards;
}

/* =====================================================
   ANIMATIONS
   ===================================================== */
@keyframes bob     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes popIn   { from{opacity:0;transform:scale(0.65)} to{opacity:1;transform:scale(1)} }
@keyframes shake   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
@keyframes pop     { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }
@keyframes starPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
@keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-180px) scale(1.4) rotate(15deg);opacity:0} }

/* =====================================================
   RESPONSIVE
   ===================================================== */
@media (max-width:600px) {
  .hero-title { font-size:36px; }
  .q-card     { padding:22px 16px 18px; }
  .q-text     { font-size:20px; }
  .opt-btn    { font-size:14px; padding:12px 12px; }
  .opts-grid.g2 { grid-template-columns:1fr; }
  .res-wrap   { padding:32px 20px; }
  .res-title  { font-size:26px; }
}
</style>
</head>
<body>

<!-- ==============================
     GLOBAL TOP BAR
     ============================== -->
<header class="topbar">
  <div class="topbar-brand" onclick="goHome()"><span class="rocket">🚀</span> EnglishQuest</div>
  <div class="topbar-right">
    <div class="score-pill"><span class="s">⭐</span><span id="g-score">0</span> pts</div>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Modo noturno">🌙</button>
  </div>
</header>

<!-- ==============================
     HOME
     ============================== -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <span class="hero-icon">🎓</span>
    <h1 class="hero-title">EnglishQuest</h1>
    <p class="hero-sub">Aprenda inglês de forma divertida!</p>
    <div class="hero-badges">
      <span class="hero-badge">📝 300+ exercícios</span>
      <span class="hero-badge">🗂️ 9 módulos</span>
      <span class="hero-badge" id="hero-done">✅ 0 completos</span>
    </div>
  </div>
  <div class="home-body">
    <div class="home-sec-title">🎯 Escolha um módulo</div>
    <div class="modules-grid" id="mods-grid"></div>
  </div>
</div>

<!-- ==============================
     QUIZ
     ============================== -->
<div class="page" id="page-quiz">
  <div class="quiz-sub">
    <div class="quiz-sub-row">
      <button class="btn-back" onclick="goHome()">←</button>
      <div class="quiz-meta">
        <div class="quiz-name" id="quiz-name">—</div>
        <div class="quiz-cnt"  id="quiz-cnt">Questão 1 de 30</div>
      </div>
      <div class="quiz-pts">⭐ <span id="quiz-pts">0</span></div>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="quiz-body" id="quiz-body">
    <div class="q-card" id="q-card"><!-- dynamic --></div>
  </div>
</div>

<!-- ==============================
     RESULTS
     ============================== -->
<div class="page" id="page-results">
  <div class="res-wrap">
    <span class="res-mascot" id="r-mascot">🏆</span>
    <h2 class="res-title" id="r-title">Parabéns!</h2>
    <p class="res-sub"     id="r-sub">Módulo concluído!</p>
    <div class="score-ring" id="r-ring">
      <div class="score-inner">
        <span class="score-num" id="r-num">0</span>
        <span class="score-of"  id="r-of">de 0 acertos</span>
      </div>
    </div>
    <div class="pct-lbl" id="r-pct">0%</div>
    <div class="stars-row" id="r-stars">
      <span class="star-ico">⭐</span>
      <span class="star-ico">⭐</span>
      <span class="star-ico">⭐</span>
    </div>
    <div class="res-msg" id="r-msg">Ótimo trabalho!</div>
    <div class="res-acts">
      <button class="btn-r btn-r-sec" onclick="retryMod()">🔄 Tentar Novamente</button>
      <button class="btn-r btn-r-pri" onclick="goHome()">🏠 Início</button>
    </div>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
/* ======================================================  HELPERS  */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(a,n){return shuffle(a).slice(0,n);}
function norm(s){return s.toLowerCase().replace(/[?!.,]/g,'').replace(/\s+/g,' ').trim();}
function esc(s){return s.replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
const LETS=['A','B','C','D','E','F'];

/* ======================================================  THEME  */
let dark=false;
try{dark=localStorage.getItem('eq_th')==='dark';}catch(e){}
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
  try{localStorage.setItem('eq_th',dark?'dark':'light');}catch(e){}
}
function toggleTheme(){dark=!dark;applyTheme();}
applyTheme();

/* ======================================================  DATA  */

/* ======================================================  STATE  */
let S={mid:null,qs:[],idx:0,score:0,done:false,saved:{}};
try{S.saved=JSON.parse(localStorage.getItem('eq_v3')||'{}');}catch(e){}
function save(){try{localStorage.setItem('eq_v3',JSON.stringify(S.saved));}catch(e){}}
function totalPts(){return Object.values(S.saved).reduce((t,v)=>t+(v.score||0),0);}
function syncPts(){document.getElementById('g-score').textContent=totalPts();}

/* ======================================================  NAVIGATION  */
function showPage(id){
  // Hide all
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  // Show target
  document.getElementById('page-'+id).classList.add('active');
  // Always scroll window to top
  window.scrollTo(0,0);
  document.documentElement.scrollTop=0;
  document.body.scrollTop=0;
  // Also reset any inner scrollable div
  const qb=document.getElementById('quiz-body');
  if(qb) qb.scrollTop=0;
  // Results page: scroll its flex container to top
  const rp=document.getElementById('page-results');
  if(rp) rp.scrollTop=0;
}

function goHome(){showPage('home');renderHome();}

/* ======================================================  HOME  */
function renderHome(){
  syncPts();
  const done=Object.keys(S.saved).length;
  document.getElementById('hero-done').textContent=`✅ ${done} completos`;
  const grid=document.getElementById('mods-grid');
  grid.innerHTML='';
  MODS.forEach(m=>{
    const sv=S.saved[m.id]||{};
    const pct=sv.pct!=null?sv.pct:null;
    const c=document.createElement('div');
    c.className='mod-card';
    c.style.setProperty('--c',m.color);
    c.onclick=()=>startMod(m.id);
    c.innerHTML=`
      <div class="mc-row">
        <span class="mc-emoji">${m.emoji}</span>
        <span class="mc-pill">${m.qs.length} questões</span>
      </div>
      <div class="mc-title">${m.title}</div>
      <div class="mc-sub">${m.sub}</div>
      <div class="mc-bar"><div class="mc-bar-fill" style="width:${pct!=null?pct+'%':'0%'}"></div></div>
      <div class="mc-bar-lbl">${pct!=null?`Melhor: ${sv.score}/${sv.total} acertos (${pct}%)`:'Ainda não tentado'}</div>
    `;
    grid.appendChild(c);
  });
}

/* ======================================================  QUIZ START  */
function startMod(id){
  const m=MODS.find(x=>x.id===id);
  S.mid=id; S.qs=shuffle([...m.qs]); S.idx=0; S.score=0; S.done=false;
  document.getElementById('quiz-name').textContent=`${m.emoji} ${m.title}`;
  document.getElementById('prog-fill').style.background=m.color;
  showPage('quiz');
  renderQ();
}

/* ======================================================  QUIZ RENDER  */
function renderQ(){
  const q=S.qs[S.idx],total=S.qs.length;
  const m=MODS.find(x=>x.id===S.mid);
  document.getElementById('quiz-cnt').textContent=`Questão ${S.idx+1} de ${total}`;
  document.getElementById('quiz-pts').textContent=S.score;
  document.getElementById('prog-fill').style.width=`${(S.idx/total)*100}%`;
  S.done=false;

  const nextLbl=S.idx<total-1?'Próxima questão ➜':'🏁 Ver resultado';
  const card=document.getElementById('q-card');
  card.innerHTML=`
    <div class="q-tag" style="color:${m.color}">
      <span class="q-tag-dot"></span> Questão ${S.idx+1} / ${total}
    </div>
    <div class="q-text">${q.q}</div>
    ${q.type==='mc'?buildMC(q):buildFill()}
    <div class="feedback" id="fb"></div>
    <button class="btn-next" id="btn-nxt" onclick="nextQ()">${nextLbl}</button>
  `;

  // Reset inner scroll
  const qb=document.getElementById('quiz-body');
  if(qb) qb.scrollTop=0;

  if(q.type==='fill'){
    const i=document.getElementById('fill-inp');
    i.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
    i.focus();
  }
}

function buildMC(q){
  const n=q.opts.length;
  const cls=n<=3?'g2':n===5?'g1':'g2';
  return `<div class="opts-grid ${cls}">${q.opts.map((o,i)=>`
    <button class="opt-btn" data-v="${esc(o)}" onclick="checkMC(this,'${esc(o)}','${esc(q.ans)}')">
      <span class="opt-ltr">${LETS[i]}</span><span>${o}</span>
    </button>`).join('')}</div>`;
}
function buildFill(){
  return `<div class="fill-wrap">
    <input id="fill-inp" class="fill-inp" type="text" placeholder="Digite a resposta em inglês…" autocomplete="off" spellcheck="false">
    <button class="btn-chk" id="btn-chk" onclick="checkFill()">✅ Verificar</button>
  </div>`;
}

/* ======================================================  ANSWER CHECK  */
const OK=['🎯 Perfeito!','⭐ Excelente!','🔥 Mandou bem!','💪 Isso aí!','🚀 Arrasou!','✨ Incrível!','🏆 Ótimo!'];
const ERR=['Continue tentando!','Quase lá!','Você vai lá!','Não desista!'];

function checkMC(btn,chosen,correct){
  if(S.done)return; S.done=true;
  btn.closest('.opts-grid').querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.v===correct)b.classList.add('correct');
  });
  const ok=chosen===correct;
  if(!ok)btn.classList.add('wrong');
  if(ok){S.score++;spawnE('🎉');}
  document.getElementById('quiz-pts').textContent=S.score;
  showFB(ok,correct);
  document.getElementById('btn-nxt').classList.add('show');
}
function checkFill(){
  if(S.done)return;
  const inp=document.getElementById('fill-inp');
  const v=inp.value.trim(); if(!v)return;
  const q=S.qs[S.idx];
  const ok=norm(v)===norm(q.ans);
  S.done=true;
  inp.disabled=true; inp.classList.add(ok?'correct':'wrong');
  document.getElementById('btn-chk').disabled=true;
  if(ok){S.score++;spawnE('🎉');}
  document.getElementById('quiz-pts').textContent=S.score;
  showFB(ok,q.ans);
  document.getElementById('btn-nxt').classList.add('show');
}
function showFB(ok,ans){
  const fb=document.getElementById('fb');
  fb.className=`feedback show ${ok?'ok':'err'}`;
  fb.textContent=ok?OK[0|Math.random()*OK.length]:`❌ ${ERR[0|Math.random()*ERR.length]} — Resposta: "${ans}"`;
}
function nextQ(){
  S.idx++;
  if(S.idx>=S.qs.length)showRes();
  else renderQ();
}

/* ======================================================  RESULTS  */
const RCFG=[
  {min:100,mascot:'🏆',title:'Perfeito! 100%!',msg:'Nota máxima! Você é incrível! 🌟',bg:'#FFF9E6',dbg:'#2A2610',stars:3},
  {min:80, mascot:'🎉',title:'Muito bem!',      msg:'Ótimo desempenho! Continue assim! 💪',bg:'#F0FFF0',dbg:'#102A18',stars:3},
  {min:60, mascot:'😊',title:'Bom trabalho!',   msg:'Você está indo bem! Pratique mais! 📚',bg:'#F0F8FF',dbg:'#101A2A',stars:2},
  {min:40, mascot:'💪',title:'Continue!',       msg:'Não desista! Cada erro ensina! 🌱',bg:'#FFF5EE',dbg:'#2A1A10',stars:1},
  {min:0,  mascot:'🌱',title:'Você começou!',   msg:'A jornada começa agora! 🚀',bg:'#FAF0FF',dbg:'#1E102A',stars:1},
];
function showRes(){
  const total=S.qs.length,score=S.score;
  const pct=Math.round((score/total)*100);
  const prev=S.saved[S.mid]||{};
  if(prev.pct==null||pct>=prev.pct){S.saved[S.mid]={score,total,pct};save();}
  syncPts();

  const cfg=RCFG.find(r=>pct>=r.min);
  const m=MODS.find(x=>x.id===S.mid);

  document.getElementById('r-mascot').textContent=cfg.mascot;
  document.getElementById('r-title').textContent=cfg.title;
  document.getElementById('r-sub').textContent=`${m.emoji} ${m.title}`;
  document.getElementById('r-num').textContent=score;
  document.getElementById('r-of').textContent=`de ${total} acertos`;
  document.getElementById('r-pct').textContent=`${pct}%`;
  const msgEl=document.getElementById('r-msg');
  msgEl.textContent=cfg.msg;
  msgEl.style.background=dark?cfg.dbg:cfg.bg;

  const ring=document.getElementById('r-ring');
  ring.style.background=`conic-gradient(${m.color} ${pct*3.6}deg, var(--border) 0)`;

  document.querySelectorAll('#r-stars .star-ico').forEach(s=>s.classList.remove('lit'));
  setTimeout(()=>{
    document.querySelectorAll('#r-stars .star-ico').forEach((s,i)=>{
      if(i<cfg.stars) setTimeout(()=>s.classList.add('lit'),i*220);
    });
  },300);

  showPage('results');
  if(pct>=60)launchConf();
  if(pct===100) for(let i=0;i<8;i++) setTimeout(()=>spawnE(['🏆','🎉','⭐','🌟'][0|Math.random()*4]),i*180);
}
function retryMod(){startMod(S.mid);}

/* ======================================================  CONFETTI  */
const CC=document.getElementById('confetti-canvas');
const cx=CC.getContext('2d');
let pieces=[],aid;
function launchConf(){
  CC.width=window.innerWidth; CC.height=window.innerHeight; pieces=[];
  const cols=['#FF6B6B','#4ECDC4','#FFE66D','#6BCB77','#C77DFF','#74B9FF','#FF8E53'];
  for(let i=0;i<150;i++)pieces.push({x:Math.random()*CC.width,y:-20-Math.random()*160,w:7+Math.random()*7,h:3+Math.random()*4,col:cols[0|Math.random()*cols.length],vx:(Math.random()-.5)*4,vy:3+Math.random()*5,rot:Math.random()*360,vr:(Math.random()-.5)*7,life:1});
  cancelAnimationFrame(aid); animC();
}
function animC(){
  cx.clearRect(0,0,CC.width,CC.height);
  pieces=pieces.filter(p=>p.life>0);
  pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;if(p.y>CC.height-20)p.life-=.04;cx.save();cx.globalAlpha=p.life;cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillStyle=p.col;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});
  if(pieces.length)aid=requestAnimationFrame(animC);
  else cx.clearRect(0,0,CC.width,CC.height);
}
function spawnE(e){
  const el=document.createElement('div');
  el.className='floatie';el.textContent=e;
  el.style.left=(10+Math.random()*80)+'vw';el.style.bottom='8vh';
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}
window.addEventListener('resize',()=>{CC.width=window.innerWidth;CC.height=window.innerHeight;});

/* ======================================================  BOOT  */
renderHome();
</script>
